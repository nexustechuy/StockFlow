<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockFlow - Iniciar sesión</title>
    
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Hoja de estilos -->
  <link rel="stylesheet" href="/estilos/estilos.css"> 
  <link rel="stylesheet" href="/estilos/login.css" >

</head>

<body>
  <div class="card-login">
    <h1>StockFlow</h1>
 
    <div>
      <label for="correo">Usuario/Correo</label>
        <input type="email" id="correo" placeholder="usuario/correo@ejemplo.com" />
 
      <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" />
 
      <div class="links-form">
        <a href="#">¿No tenés cuenta? Creá una</a>
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>
 
      <button class="btn-ingresar" onclick="window.location.href='dashboardVendedor.html'">Ingresar</button>
    </div>
  </div>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
